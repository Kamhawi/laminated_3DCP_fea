# Author: Abdallah Kamhawi <Kamhawi@umich.edu>
# Package Maintainer: Abdallah Kamhawi <Kamhawi@umich.edu>

# =============================================================================
# Barrel Vault 3D Concrete Printing Simulation Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Geometry Parameters
# -----------------------------------------------------------------------------
geometry:
  span: 1200.0          # Vault span/width [mm]
  length: 210.0        # Vault length/extrusion direction [mm]
  rise: 300.0           # Vault rise/height at crown [mm]
  thickness: 25.0       # Shell thickness [mm]

# -----------------------------------------------------------------------------
# Boundary Conditions
# -----------------------------------------------------------------------------
boundary_conditions:
  intrados_dirichlet_upto_layer: 10  # 0-based, inclusive

# -----------------------------------------------------------------------------
# Mesh Discretization
# -----------------------------------------------------------------------------
mesh:
  n_length: 15        # Divisions along length
  n_span: 150           # Divisions along span
  n_thickness: 1        # Divisions through thickness
  partitioner: default   # strip | default (ParMETIS/SCOTCH)

# -----------------------------------------------------------------------------
# Rheology Inputs 
# -----------------------------------------------------------------------------
material:
  tau_0: 2500.0         # Initial static yield stress right out of the nozzle [Pa]
  A_thix: 150.0         # Structuration rate for 2K system [Pa/s]
  mu_p: 200.0           # Plastic viscosity [Pa*s] (Typical Bingham viscosity)
  gamma_c: 0.01         # Critical strain [-] (Typical for fresh concrete)
  rho: 2250.0           # Density [kg/m^3] (Mortars are slightly lighter than coarse concrete)
  g: 9810.0             # Gravitational acceleration [mm/s^2]

# -----------------------------------------------------------------------------
# Transition / Hardening Inputs
# -----------------------------------------------------------------------------
hardening:
  t_set: 300.0          # Initial setting time [s] (5 minutes is typical for accelerated 2K)
  E_inf: 30000.0        # Fully hardened Young's modulus [MPa] (Mortars lack coarse aggregate)
  nu_fresh: 0.48        # Poisson's ratio at birth [-] (Nearly incompressible)
  nu_hard: 0.20         # Poisson's ratio hardened [-]
  n_h: 1.15             # Hydration exponent after t_set [-]

# -----------------------------------------------------------------------------
# Interface Parameters
# -----------------------------------------------------------------------------
interface:
  # -- Intra-layer element coupling (SIP penalty on dS(2)) --
  # Penalizes displacement jumps between DG elements within the same layer.
  # Actual penalty stiffness = gamma_bonded_mult * E / h_avg.
  # Higher -> stiffer coupling (less interpenetration), but too high -> ill-conditioning.
  gamma_bonded_mult: 200.0

  # Weak Dirichlet (Nitsche) penalty: same idea, applied at fixed boundaries.
  # Actual penalty stiffness = gamma_boundary_mult * E / h_cell.
  gamma_boundary_mult: 300.0

  # -- Inter-layer bond strength (cohesive traction-separation law on dS(1)) --
  # These control when and how layers debond under tension/shear.
  G_Ic: 0.08                    # Mode I (opening) fracture energy [N/mm]
  G_IIc: 0.14                   # Mode II (shear) fracture energy [N/mm]
  eta_BK: 1.5                   # Benzeggagh-Kenane mixed-mode interaction exponent [-]
  # Nozzle pressure affects bond quality: beta = 1 - exp(-p / tau_sub).
  # Higher pressure -> better inter-layer bond -> higher effective fracture energy.
  nozzle_pressure: 70000.0      # Nozzle deposition pressure [Pa]
  residual_stiffness_ratio: 0.05 # Min stiffness fraction after full damage (avoids singularity)
  K_min_mult: 0.001              # Lower bound on cohesive stiffness: K_min = K_min_mult * E/h

# -----------------------------------------------------------------------------
# Activation Parameters
# -----------------------------------------------------------------------------
activation:
  tcp_speed: 80.0      # Tool center point (print head) speed [mm/s]
  sharpness: 1.0        # Tanh activation steepness [-]
  alpha_min: 1.0e-10    # Minimum stiffness multiplier for inactive cells [-]

# -----------------------------------------------------------------------------
# Solver Parameters
# -----------------------------------------------------------------------------
solver:
  max_iterations: 1000   # Maximum Newton iterations per step
  rtol: 1.0e-5          # Relative tolerance
  atol: 1.0e-10         # Absolute tolerance
  active_dof_reduction: true   # Solve reduced system of active DOFs only (iterative solver)
  linear_solver: iterative    # direct | iterative
  direct:
    mumps_icntl_14: 200   # MUMPS extra workspace percentage
    out_of_core: false    # MUMPS OOC: pages factorization to disk (trades speed for memory)
  iterative:
    # Full-system solve with inactive DOFs pinned to identity rows.
    # GMRES + Additive Schwarz with overlapping ILU(1) sub-solvers.
    # ASM with overlap provides cross-rank coupling that block Jacobi lacks,
    # preventing KSP iteration explosion with multiple ranks.
    #
    # pc_type options:
    #   asm      - Additive Schwarz: overlapping subdomains, best multi-rank coupling
    #   bjacobi  - Block Jacobi: non-overlapping, one block per rank, cheaper but weaker
    #   hypre    - BoomerAMG algebraic multigrid (robust for 3D, higher setup cost)
    #   lu       - Full LU factorization as preconditioner (expensive, very robust)
    #   gamg     - PETSc native algebraic multigrid
    #   jacobi   - Diagonal (point) Jacobi, very cheap but weak
    #   none     - No preconditioning (rarely useful)
    pc_type: asm
    #
    # asm_overlap: number of cell layers shared between subdomains (asm only).
    #   0 = no overlap (like bjacobi), higher = better convergence but more memory.
    #   Typical range: 1-4.
    asm_overlap: 2
    #
    # sub_pc_type options (sub-solver applied within each subdomain/block):
    #   ilu   - Incomplete LU factorization (default, good balance)
    #   lu    - Full LU on each subdomain (most robust, most expensive)
    #   icc   - Incomplete Cholesky (only for SPD sub-blocks)
    #   none  - No sub-preconditioning
    sub_pc_type: ilu
    #
    # ilu_levels: fill level for ILU factorization.
    #   0 = ILU(0), same sparsity as original (cheapest, weakest).
    #   1 = ILU(1), one level of fill (better convergence, more memory).
    #   2+ = more fill, diminishing returns. Typical range: 0-3.
    ilu_levels: 1
    #
    # GMRES tolerances and limits:
    rtol: 1.0e-4            # GMRES relative tolerance (||r||/||r0|| < rtol)
    atol: 1.0e-12           # GMRES absolute tolerance (||r|| < atol)
    max_it: 500             # GMRES max iterations before declaring divergence
    #
    # gmres_restart: Krylov subspace size before restart.
    #   Higher = better convergence for stiff problems but more memory (stores N vectors).
    #   Too low = stalls on ill-conditioned systems. Typical range: 30-200.
    gmres_restart: 60

# -----------------------------------------------------------------------------
# Time Stepping
# -----------------------------------------------------------------------------
time_stepping:
  n_steps: 100       # Number of time steps
  max_steps: 0       # Stop after this many steps (0 = run all). For benchmarking.
  start_offset: 196     # Offset from minimum birth time [s]
  end_multiplier: 1.0  # Multiplier for maximum birth time

# -----------------------------------------------------------------------------
# Checkpoint / Restart
# -----------------------------------------------------------------------------
checkpoint:
  save_every: 10             # Save every N steps (overwrites single latest checkpoint file)
  resume_enabled: false       # Resume from latest checkpoint metadata if true
  directory: "checkpoints"   # Checkpoint directory

# -----------------------------------------------------------------------------
# Output Settings
# -----------------------------------------------------------------------------
output:
  directory: "output"
  displacement_file: ""          # Optional override (blank -> disp.bp in output/run_<YYMMDD_HHMMSS>/)
  cell_data_file: ""             # Optional override (blank -> cell_data.bp in output/run_<YYMMDD_HHMMSS>/)
  log_file: ""                   # Optional override (blank -> sim_run.log in output/run_<YYMMDD_HHMMSS>/)

# -----------------------------------------------------------------------------
# Mesh Quality Thresholds (all optional — sensible defaults used if absent)
# -----------------------------------------------------------------------------
mesh_quality:
  enabled: true                    # Set false to skip quality checks entirely
  aspect_ratio_threshold: 10.0     # Flag elements above this ratio
  min_scaled_jacobian: 0.1         # Flag elements below this value
  jacobian_near_zero_tol: 1.0e-10  # Jacobian below this is "near-zero"
  volume_variation_threshold: 20.0 # Max/min volume ratio for warning
  max_skewness: 0.5                # Flag elements above this skewness
  max_warping: 0.1                 # Flag elements above this (normalised)
  fail_on_negative_jacobian: true  # Abort simulation if negative Jacobian found

# -----------------------------------------------------------------------------
# Debug (all optional)
# -----------------------------------------------------------------------------
debug:
  collective_debug: false        # Probe MPI-collective points inside Newton
  collective_debug_max_iter: 3   # Only probe the first N Newton iterations
  collective_debug_barrier: false  # Add barrier after each probe print
  output_io: false                # Probe enter/exit around VTX output writes
  step_setup: false             # Probe rank progress in pre-solver step setup
  step_setup_max_steps: 3       # Only print setup probes for first N steps
  newton_memory_tracking: false   # Per-rank RSS tracking (MPI-safe) — disabled to avoid extra collectives
  newton_memory_every_iter: 1     # Emit memory line every N Newton iterations
  newton_memory_collect_garbage: false  # Run Python GC before memory snapshots
  newton_memory_track_mumps: false  # Include MUMPS INFOG(16/26/29) stats (direct solver only)
